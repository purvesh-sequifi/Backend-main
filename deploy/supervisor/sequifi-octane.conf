[program:sequifi-octane]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/backend/artisan octane:start --server=swoole --host=0.0.0.0 --port=8000 --workers=8 --task-workers=4 --max-requests=1000
directory=/var/www/backend
user=www-data
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
numprocs=1
redirect_stderr=true
stdout_logfile=/var/www/backend/storage/logs/octane-stdout.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=5
stderr_logfile=/var/www/backend/storage/logs/octane-stderr.log
stderr_logfile_maxbytes=10MB
stderr_logfile_backups=5
stopwaitsecs=20
startsecs=10
stopsignal=QUIT

