name: Staging Server Deployments - BE

on:
  push:
    branches:
      - STG-Backend

env:
  DEPLOY_USER: "ubuntu"
  DEPLOY_PATH: "/var/www/backend"

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false  # Allow all deployments to complete even if one failed
      matrix:
        include:

          - name: fiberstage.sequifi.com
            host: "18.144.113.84"
            ssm_param: "/backend/fiberstage"
            concurrency_group: "fiberstage-deployment"

          - name: mortgagestage.sequifi.com
            host: "204.236.188.240"
            ssm_param: "/backend/mortgagestage"
            concurrency_group: "mortgagestage-deployment"

          - name: peststage.sequifi.com
            host: "52.52.130.82"
            ssm_param: "/backend/peststage"
            concurrency_group: "peststage-deployment"

          - name: solarstage.sequifi.com
            host: "52.53.134.176"
            ssm_param: "/backend/solarstage"
            concurrency_group: "solarstage-deployment"

          - name: turfstage.sequifi.com
            host: "13.52.174.136"
            ssm_param: "/backend/turfstage"
            concurrency_group: "turfstage-deployment"


    concurrency:
      group: ${{ matrix.concurrency_group }}
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to ${{ matrix.name }}
        uses: appleboy/ssh-action@master
        with:
          host: ${{ matrix.host }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.SEQUIFI_PROD_KEY }}
          script: |
            set -e

            DEPLOY_PATH="/var/www/backend"
            DEPLOY_DIR="${DEPLOY_PATH}/${{ github.run_number }}"
            SSM_PARAM="${{ matrix.ssm_param }}"

            echo "Starting Deployment #${{ github.run_number }} to ${{ matrix.name }}"
            echo "Using SSM Parameter: $SSM_PARAM"

            sudo rm -rf "${DEPLOY_DIR}" 2>/dev/null || true
            sudo mkdir -p "${DEPLOY_DIR}"

            sudo git clone --branch="${{ github.ref_name }}" \
              "https://x-token-auth:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
              "${DEPLOY_DIR}"

            sudo chown -R www-data:www-data "${DEPLOY_DIR}"
            sudo chmod +x "${DEPLOY_DIR}/scripts/deploy.sh"

            cd "${DEPLOY_DIR}"

            sudo bash scripts/deploy.sh "${{ github.run_number }}" "${{ github.ref_name }}" "${{ github.sha }}" "$SSM_PARAM"
