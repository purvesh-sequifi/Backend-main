# ============================================================================
# REDIS PERSISTENCE CONFIGURATION FOR LARAVEL OCTANE + HORIZON
# ============================================================================
#
# Installation:
# 1. Copy this file: sudo cp redis-persistence.conf /etc/redis/redis-persistence.conf
# 2. Update Redis config: sudo nano /etc/redis/redis.conf
# 3. Include at bottom: include /etc/redis/redis-persistence.conf
# 4. Restart Redis: sudo systemctl restart redis-server
#
# Verification:
# redis-cli CONFIG GET appendonly
# redis-cli CONFIG GET save
#
# ============================================================================

# ============================================================================
# AOF (Append-Only File) PERSISTENCE
# ============================================================================
# AOF provides better durability for queue data. Recommended for Horizon.

# Enable AOF persistence
appendonly yes

# AOF filename
appendfilename "appendonly.aof"

# AOF sync strategy:
# - always: Sync after every write (slowest, most durable)
# - everysec: Sync every second (recommended balance)
# - no: Let OS decide when to sync (fastest, least durable)
appendfsync everysec

# Disable fsync while rewriting AOF (improves performance during rewrites)
no-appendfsync-on-rewrite no

# Automatically rewrite AOF when it grows too large
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Load truncated AOF on startup (safer recovery)
aof-load-truncated yes

# Use RDB-AOF hybrid format (best of both worlds)
aof-use-rdb-preamble yes

# ============================================================================
# RDB (Snapshot) PERSISTENCE
# ============================================================================
# RDB creates point-in-time snapshots. Good for backups.

# Save snapshots automatically:
# save <seconds> <changes>
save 900 1      # After 900 sec (15 min) if at least 1 key changed
save 300 10     # After 300 sec (5 min) if at least 10 keys changed
save 60 10000   # After 60 sec if at least 10000 keys changed

# RDB filename
dbfilename dump.rdb

# Compression
rdbcompression yes

# Checksum verification
rdbchecksum yes

# Working directory for RDB/AOF files
dir /var/lib/redis

# ============================================================================
# MEMORY MANAGEMENT
# ============================================================================

# Maximum memory (adjust based on server RAM)
# Recommendation: 25-50% of available RAM for Redis
maxmemory 2gb

# Eviction policy when maxmemory is reached
# - allkeys-lru: Remove least recently used keys (recommended)
# - volatile-lru: Remove LRU keys with expire set
# - allkeys-lfu: Remove least frequently used keys
# - noeviction: Return errors when memory limit is reached
maxmemory-policy allkeys-lru

# Samples for LRU/LFU algorithms (higher = more accurate but slower)
maxmemory-samples 5

# ============================================================================
# NETWORK CONFIGURATION
# ============================================================================

# Listen on localhost (change if Redis is on separate server)
bind 127.0.0.1 ::1

# Port
port 6379

# TCP listen() backlog
tcp-backlog 511

# Close connection after client idle for N seconds (0 = disable)
timeout 0

# TCP keepalive
tcp-keepalive 300

# ============================================================================
# PERFORMANCE TUNING
# ============================================================================

# Max number of clients
maxclients 10000

# Disable THP (Transparent Huge Pages) support warning
# Run: echo never > /sys/kernel/mm/transparent_hugepage/enabled

# Disable swapping warning
# Run: sysctl vm.overcommit_memory=1

# Background save may fail under low memory
stop-writes-on-bgsave-error yes

# ============================================================================
# LOGGING
# ============================================================================

# Log level: debug, verbose, notice, warning
loglevel notice

# Log file location
logfile /var/log/redis/redis-server.log

# ============================================================================
# SECURITY (Recommended)
# ============================================================================

# Require password (uncomment and set strong password)
# requirepass YourStrongPasswordHere

# Disable dangerous commands in production
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command CONFIG "CONFIG_ADMIN_ONLY"
rename-command SHUTDOWN "SHUTDOWN_ADMIN_ONLY"

# ============================================================================
# SLOW LOG
# ============================================================================

# Log queries slower than N microseconds
slowlog-log-slower-than 10000

# Keep last N slow log entries
slowlog-max-len 128

# ============================================================================
# MONITORING
# ============================================================================

# Enable keyspace notifications (useful for monitoring)
notify-keyspace-events ""

# ============================================================================
# REPLICATION (Optional - for high availability)
# ============================================================================

# Uncomment if this is a replica
# replicaof <masterip> <masterport>
# masterauth <master-password>

# ============================================================================
# END OF CONFIGURATION
# ============================================================================

